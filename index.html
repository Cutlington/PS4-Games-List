<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="index-page">

    <div class="sidebar">
        <h2>Filters</h2>

        <!-- SEARCH AT TOP -->
        <div class="filter-group">
            <label for="search">Search</label>
            <input type="text" id="search" placeholder="Search games...">
        </div>

        <!-- GENRE CHECKBOXES -->
        <div class="filter-group">
            <label>Genres</label>
            <div id="genreFilters" class="checkbox-list"></div>
        </div>

        <!-- PLATFORM CHECKBOXES -->
        <div class="filter-group">
            <label>Platforms</label>
            <div id="platformFilters" class="checkbox-list"></div>
        </div>

        <!-- RESET BUTTON -->
        <button id="resetFilters" class="reset-btn">Reset / Show All</button>
    </div>

    <div class="main-content">
        <h1>Game Library</h1>

        <!-- FIXED: MUST HAVE BOTH id AND class -->
        <div id="gameGrid" class="game-grid"></div>
    </div>

    <script src="scripts.js?v=100"></script>
</body>
</html>
