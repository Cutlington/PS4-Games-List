<!DOCTYPE html>
<html>
<head>
    <title>PS4 Game Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/sst" rel="stylesheet">
</head>
<body>

<!-- Background Waves (PS4 Theme) -->
<div class="ps4-waves"></div>

<!-- Sidebar for Genres -->
<div id="sidebar">
    <h3>Genres</h3>
    <div id="genre-filters"></div>
    <button id="resetFilters">Show All</button>
</div>

<!-- Search Bar -->
<div id="searchBarContainer">
    <input type="text" id="searchInput" placeholder="Search by title, ID, or year">
</div>

<!-- Page Title -->
<h1 class="page-title">PS4 Game Library</h1>

<!-- Game Grid -->
<div id="gameGrid" class="grid"></div>

<!-- Scripts -->
<script src="scripts.js"></script>

</body>
</html>
