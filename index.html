<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Game Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Filters</h2>

        <!-- Search -->
        <label for="search">Search</label>
        <input type="text" id="search" placeholder="Search games...">

        <!-- Sort -->
        <label for="sortLetter">Sort By (A–Z)</label>
        <select id="sortLetter" style="color: black; background-color: white;">
            <option value="all">All</option>
            <!-- A–Z will be auto‑generated in scripts.js -->
        </select>

        <!-- Genres (auto-filled by scripts.js) -->
        <h2>Genres</h2>
        <div id="genreFilters"></div>

        <!-- Show All -->
        <button id="resetFilters"
            style="margin-top: 15px; padding: 8px 12px; width: 100%; border-radius: 6px; border: none;
                   background: rgba(0,140,255,0.8); color: white; cursor: pointer;">
            Show All
        </button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h1 style="margin-bottom: 20px;">PS4 Game Library</h1>

        <!-- Game Grid -->
        <div id="games-container"></div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
